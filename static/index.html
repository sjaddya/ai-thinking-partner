<!DOCTYPE html>
<html>
<head>
    <title>AI Thinking Partner</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1>AI Thinking Partner</h1>

<div class="section">
    <h2>Create Habit</h2>
    <input id="habitName" placeholder="Habit name">
    <input id="habitType" placeholder="Habit type">
    <button onclick="createHabit()">Create</button>
</div>

<div class="section">
    <h2>Habits</h2>
    <div class="button-group">
        <button onclick="loadHabits(false)">Active Habits</button>
        <button onclick="loadHabits(true)">Archived Habits</button>
    </div>
    <ul id="habitList"></ul>
</div>

<div class="section">
    <h2>Daily Progress</h2>
    <input id="progressDate" placeholder="YYYY-MM-DD">
    <button onclick="loadProgress()">Show</button>
    <pre id="progressOutput"></pre>
</div>

<script src="/static/app.js"></script>

</body>
</html>
